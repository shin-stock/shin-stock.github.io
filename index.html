<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>株比較チャート</title>
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
<h3>株価比較（前日比 d2 ）</h3>

<div id="chart" style="width:100%; height:400px; border:1px solid #ccc;"></div>

<script>
const chartEl = document.getElementById('chart');

const chart = LightweightCharts.createChart(chartEl, {
    width: Math.max(document.documentElement.clientWidth - 16, 300),
    height: 400,
    layout: {
        background: { color: '#ffffff' },
        textColor: '#000000'
    },
    grid: {
        vertLines: { color: '#e0e0e0' },
        horzLines: { color: '#e0e0e0' }
    },
    rightPriceScale: {
        visible: true
    },
    timeScale: {
        visible: true,
        borderVisible: true
    }
});
    
function normalizeData(data) {
    const base = data[0].value;

    return data.map(item => ({
        time: item.time,
        value: item.value / base * 100
    }));
}
    
const line1 = chart.addSeries(LightweightCharts.LineSeries, {
    lineWidth: 2,
    title: '7203'
});

const realLikeDataB = [
    { time: '2026-03-16', value: 2820 },
    { time: '2026-03-17', value: 2865 },
    { time: '2026-03-18', value: 2838 },
    { time: '2026-03-19', value: 2600 },
    { time: '2026-03-20', value: 3000 }
];

const line2 = chart.addSeries(LightweightCharts.LineSeries, {
    lineWidth: 2,
    title: 'B'
});

const baseB = realLikeDataB[0].value;

const normalizedB = realLikeDataB.map(item => ({
    time: item.time,
    value: item.value / baseB * 100
}));

line2.setData(normalizedB)
    
fetch('./data.json')
.then(res => res.json())
.then(realData => {
 
    const base = realData[0].value;
    const normalizedData = realData.map(item => ({
        time: item.time,
        value: item.value / base * 100
    }));
  line1.setData(normalizedData);
  chart.timeScale().fitContent();
});

/*

.then(res => res.json())
.then(realData => {

    const normalizedData = normalizeData(realData);

    line1.setData(normalizedData);
    chart.timeScale().fitContent();
});
*/
    
window.addEventListener('resize', () => {
    chart.applyOptions({
        width: Math.max(document.documentElement.clientWidth - 16, 300)
    });
});
</script>


</body>
</html>

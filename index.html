<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>株比較チャート</title>
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
<h3>株価比較（前日比13）</h3>

<div id="chart" style="width:100%; height:400px;"></div>

<script>
const chart = LightweightCharts.createChart(document.getElementById('chart'), {
    width: document.getElementById('chart').clientWidth,
    height: 400
});

const line1 = chart.addLineSeries({ title: "A" });
const line2 = chart.addLineSeries({ title: "B" });
const line3 = chart.addLineSeries({ title: "C" });

// ダミーデータ（ここを後でAPIに差し替え）
const dataA = [
    { time: '2024-01-01', value: 100 },
    { time: '2024-01-02', value: 102 },
    { time: '2024-01-03', value: 105 }
];

const dataB = [
    { time: '2024-01-01', value: 100 },
    { time: '2024-01-02', value: 101 },
    { time: '2024-01-03', value: 99 }
];

const dataC = [
    { time: '2024-01-01', value: 100 },
    { time: '2024-01-02', value: 98 },
    { time: '2024-01-03', value: 97 }
];

line1.setData(dataA);
line2.setData(dataB);
line3.setData(dataC);
</script>

</body>
</html>

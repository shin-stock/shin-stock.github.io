<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>株比較チャート</title>
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head> 
    
<body>
    
<h3>株価比較（前日比 J01  ）</h3>
<div id="controls"></div>   
<label><input type="checkbox" id="normalizeToggle" checked> 正規化</label>
<label><input type="checkbox" id="relativeToggle"> 基準銘柄で割る</label>
<label for="baseStockSelect">基準銘柄:</label>
<select id="baseStockSelect"></select>
<div id="chart" style="width:100%; height:400px; border:1px solid #ccc;"></div>

<script>
const stocks = [
    { name: 'トヨタ', file: './data.json' },
    { name: 'スズキ', file: './data2.json' },
    { name: 'ソニー', file: './data3.json' }
];
    
const controls = document.getElementById('controls');  
const lines = [];
controls.innerHTML = '';
stocks.forEach((stock, index) => {
    const toggleId = 'toggle' + index;
    controls.innerHTML += createToggle(toggleId, stock.name);
});

const chartEl = document.getElementById('chart');

const chart = LightweightCharts.createChart(chartEl, {
    width: Math.max(document.documentElement.clientWidth - 16, 300),
    height: 400,
    layout: {
        background: { color: '#ffffff' },
        textColor: '#000000'
    },
    grid: {
        vertLines: { color: '#e0e0e0' },
        horzLines: { color: '#e0e0e0' }
    },
    rightPriceScale: {
        visible: true
    },


    timeScale: {
        visible: true,
        borderVisible: true
    }
});

const rawDataMap = {};
let useRelative = false;
let baseStockIndex = 0;
let useNormalize = true;

const baseStockSelect = document.getElementById('baseStockSelect');

stocks.forEach((stock, index) => {
    baseStockSelect.innerHTML += `<option value="${index}">${stock.name}</option>`;
});

baseStockSelect.value = baseStockIndex;
    
stocks.forEach((stock, index) => {
    const line = chart.addSeries(LightweightCharts.LineSeries, {
        lineWidth: 2,
        title: stock.name
    });

    lines.push(line);
});

stocks.forEach((stock, index) => {
    const toggleId = 'toggle' + index;
    const line = lines[index];
    
    loadAndSetData(stock.file, line);
    bindToggle(toggleId, line);
});

document.getElementById('normalizeToggle').addEventListener('change', function () {
    useNormalize = this.checked;

    // 全データ再読み込み
    stocks.forEach((stock, index) => {
        loadAndSetData(stock.file, lines[index]);
    });
});

document.getElementById('relativeToggle').addEventListener('change', function () {
    useRelative = this.checked;
    refreshAllLines();
});

baseStockSelect.addEventListener('change', function () {
    baseStockIndex = Number(this.value);
    refreshAllLines();
});

window.addEventListener('resize', () => {
    chart.applyOptions({
        width: Math.max(document.documentElement.clientWidth - 16, 300)
    });
});


///////////////// user function  //////////////////////////////////

function createToggle(toggleId, labelText) {
    return `<label><input type="checkbox" id="${toggleId}" checked> ${labelText}</label>`;
}

function bindToggle(toggleId, line) {
    document.getElementById(toggleId).addEventListener('change', function () {
        line.applyOptions({
            visible: this.checked
        });
    });
}

function loadAndSetData(fileName, line) {
    fetch(fileName)
    .then(res => res.json())
    .then(realData => {
        const processed = processData(realData);
        line.setData(processed);
        chart.timeScale().fitContent();
    })
    .catch(err => {
        console.log(fileName + ' の読み込み失敗', err);
    });
}


function processData(data, stockIndex) {
    let result = data;

    if (useNormalize) {
        const base = result[0].value;
        result = result.map(item => ({
            time: item.time,
            value: item.value / base * 100
        }));
    }

    if (useRelative) {
        const baseStock = stocks[baseStockIndex];
        const baseData = rawDataMap[baseStock.file];

        if (!baseData) {
            return result;
        }

        let processedBase = baseData;

        if (useNormalize) {
            const base = processedBase[0].value;
            processedBase = processedBase.map(item => ({
                time: item.time,
                value: item.value / base * 100
            }));
        }

        result = result.map((item, i) => ({
            time: item.time,
            value: item.value / processedBase[i].value
        }));
    }

    return result;
}
    
function refreshAllLines() {
    stocks.forEach((stock, index) => {
        const line = lines[index];
        const data = rawDataMap[stock.file];

        if (!data) {
            return;
        }

        const processed = processData(data, index);
        line.setData(processed);
    });

    chart.timeScale().fitContent();
}

    
function loadAndSetData(fileName, line) {
    fetch(fileName)
    .then(res => res.json())
    .then(realData => {
        rawDataMap[fileName] = realData;
        refreshAllLines();
    })

    .catch(err => {
        console.log(fileName + ' の読み込み失敗', err);
    });
}

    
////////////////////////////////////////////////////////////////////
/*******************************************************************
baseStockSelect.disabled = true;

document.getElementById('relativeToggle').addEventListener('change', function () {
    useRelative = this.checked;

    // プルダウンの有効/無効切替
    baseStockSelect.disabled = !this.checked;

    refreshAllLines();
});





*///////////////////////////////////////////////////////////////////
    
</script>

</body>
</html>

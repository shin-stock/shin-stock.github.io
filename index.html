<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>株比較チャート</title>
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
<h3>株価比較（前日比20）</h3>

<div id="chart" style="width:100%; height:400px; border:1px solid #ccc;"></div>


<script>
const chartEl = document.getElementById('chart');

const chart = LightweightCharts.createChart(chartEl, {
    width: Math.max(document.documentElement.clientWidth - 16, 300),
    height: 400,
    layout: {
        background: { color: '#ffffff' },
        textColor: '#000000'
    },
    grid: {
        vertLines: { color: '#e0e0e0' },
        horzLines: { color: '#e0e0e0' }
    },
    rightPriceScale: {
        visible: true
    },
    timeScale: {
        visible: true,
        borderVisible: true
    }
});

const line1 = chart.addSeries(LightweightCharts.LineSeries, {
    lineWidth: 2,
    title: 'A'
});
const line2 = chart.addSeries(LightweightCharts.LineSeries, {
    lineWidth: 2,
    title: 'B'
});
const line3 = chart.addSeries(LightweightCharts.LineSeries, {
    lineWidth: 2,
    title: 'C'
});

const dataA = [
    { time: '2024-01-01', value: 100 },
    { time: '2024-01-02', value: 102 },
    { time: '2024-01-03', value: 105 }
];

const dataB = [
    { time: '2024-01-01', value: 100 },
    { time: '2024-01-02', value: 101 },
    { time: '2024-01-03', value: 99 }
];

const dataC = [
    { time: '2024-01-01', value: 100 },
    { time: '2024-01-02', value: 98 },
    { time: '2024-01-03', value: 97 }
];

line1.setData(dataA);
line2.setData(dataB);
line3.setData(dataC);

chart.timeScale().fitContent();

window.addEventListener('resize', () => {
    chart.applyOptions({
        width: Math.max(document.documentElement.clientWidth - 16, 300)
    });
});
</script>

</body>
</html>

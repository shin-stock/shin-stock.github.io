<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>株比較チャート</title>
<script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
</head>
<body>
<h3>株価比較（前日比31）</h3>

<div id="chart" style="width:100%; height:400px; border:1px solid #ccc;"></div>

<script>
const chartEl = document.getElementById('chart');

const chart = LightweightCharts.createChart(chartEl, {
    width: Math.max(document.documentElement.clientWidth - 16, 300),
    height: 400,
    layout: {
        background: { color: '#ffffff' },
        textColor: '#000000'
    },
    grid: {
        vertLines: { color: '#e0e0e0' },
        horzLines: { color: '#e0e0e0' }
    },
    rightPriceScale: {
        visible: true
    },
    timeScale: {
        visible: true,
        borderVisible: true
    }
});

const line1 = chart.addSeries(LightweightCharts.LineSeries, {
    lineWidth: 2,
    title: '7203'
});
const line2 = chart.addSeries(LightweightCharts.LineSeries, {
    lineWidth: 2,
    title: 'B'
});
const line3 = chart.addSeries(LightweightCharts.LineSeries, {
    lineWidth: 2,
    title: 'C'
});

const realLikeData = [
    { time: '2026-03-16', value: 2840 },
    { time: '2026-03-17', value: 2865 },
    { time: '2026-03-18', value: 2838 },
    { time: '2026-03-19', value: 2892 },
    { time: '2026-03-20', value: 2910 }
];

const dataB = [
    { time: '2026-03-16', value: 100 },
    { time: '2026-03-17', value: 101 },
    { time: '2026-03-18', value: 99 },
    { time: '2026-03-19', value: 102 },
    { time: '2026-03-20', value: 103 }
];

const dataC = [
    { time: '2026-03-16', value: 100 },
    { time: '2026-03-17', value: 98 },
    { time: '2026-03-18', value: 97 },
    { time: '2026-03-19', value: 99 },
    { time: '2026-03-20', value: 96 }
];


fetch('./data.json')
.then(res => res.json())
.then(realData => {
    line1.setData(realData);
    chart.timeScale().fitContent();
});
//line1.setData(realLikeData);
line2.setData(dataB);
line3.setData(dataC);

chart.timeScale().fitContent();

window.addEventListener('resize', () => {
    chart.applyOptions({
        width: Math.max(document.documentElement.clientWidth - 16, 300)
    });
});
</script>


</body>
</html>
